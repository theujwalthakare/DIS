version: '3.8'
services:
  autoencoder:
    build:
      context: .
      dockerfile: Dockerfile
    image: dis-autoencoder:latest
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: ["python", "ml/train_autoencoder_sklearn.py", "--input", "data/metrics.csv", "--out", "models/ae_sklearn.joblib"]
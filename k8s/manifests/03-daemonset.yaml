apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dis-agent
  namespace: dis-system
  labels:
    app: dis-agent
    component: immune-system
spec:
  selector:
    matchLabels:
      app: dis-agent
  template:
    metadata:
      labels:
        app: dis-agent
        component: immune-system
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: dis-agent
      hostNetwork: true
      hostPID: true
      containers:
      - name: dis-agent
        image: dis-kubernetes:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        ports:
        - containerPort: 8000
          name: metrics
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: config
          mountPath: /app/config
        - name: models
          mountPath: /app/models
        securityContext:
          privileged: true
      volumes:
      - name: config
        configMap:
          name: dis-config
      - name: models
        emptyDir: {}

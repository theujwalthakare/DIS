# Chaos Mesh Experiments for DIS Testing
# =======================================

# This directory contains Chaos Mesh experiment manifests for testing
# the Digital Immune System's response to various failure scenarios.

---
# CPU Stress Experiment
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: cpu-stress-test
  namespace: default
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: test-app
  stressors:
    cpu:
      workers: 4
      load: 100
  duration: "2m"
  scheduler:
    cron: "@every 10m"

---
# Memory Stress Experiment
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: memory-stress-test
  namespace: default
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: test-app
  stressors:
    memory:
      workers: 4
      size: "256MB"
  duration: "2m"

---
# Network Latency Experiment
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-latency-test
  namespace: default
spec:
  action: delay
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: test-app
  delay:
    latency: "100ms"
    correlation: "100"
    jitter: "0ms"
  duration: "2m"

---
# Pod Kill Experiment
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: pod-kill-test
  namespace: default
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: test-app
  duration: "1m"
  scheduler:
    cron: "@every 15m"

---
# Network Partition Experiment
apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: network-partition-test
  namespace: default
spec:
  action: partition
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: test-app
  direction: both
  duration: "2m"

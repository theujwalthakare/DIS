apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: adc-agent
  labels:
    app: adc-agent
spec:
  selector:
    matchLabels:
      name: adc-agent
  template:
    metadata:
      labels:
        name: adc-agent
    spec:
      containers:
        - name: adc-agent
          image: python:3.11-slim
          command: ["python", "/app/agents/adc_agent.py"]
          ports:
            - containerPort: 8000
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: ADC_PORT
              value: "8000"
            - name: COLLECTION_INTERVAL
              value: "5"
          volumeMounts:
            - name: app-volume
              mountPath: /app
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: app-volume
          hostPath:
            path: /mnt/dis-app
            type: Directory
      serviceAccountName: adc-agent-sa

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: adc-agent
  labels:
    app: adc-agent
spec:
  selector:
    matchLabels:
      name: adc-agent
  template:
    metadata:
      labels:
        name: adc-agent
    spec:
      containers:
        - name: adc-agent
          image: ghcr.io/your-org/adc-agent:latest
          ports:
            - containerPort: 8000
          env:
            - name: PROMETHEUS_PORT
              value: "8000"
      serviceAccountName: adc-agent-sa

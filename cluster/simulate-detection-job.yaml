apiVersion: batch/v1
kind: Job
metadata:
  name: simulate-detection
  namespace: default
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        job: simulate-detection
    spec:
      serviceAccountName: simulate-sa
      restartPolicy: Never
      containers:
        - name: simulate
          # Uses the TF base image built locally earlier; change image/pull policy
          # as needed for your cluster (IfNotPresent / Never / image from registry).
          image: dis-autoencoder:tfbase
          # prefer local image when testing on Docker Desktop; set to IfNotPresent
          # if you push to a registry. Using Never forces the node to use the
          # already-built local image (no pull attempt).
          imagePullPolicy: Never
          command:
            - python
            - /app/scripts/simulate_detection.py
            - --label
            - app=example-app
            - --namespace
            - default
          # If you need the model inside the container, build an image that
          # copies `ml/models/iforest.joblib` into /app/ml/models, or mount a
          # PersistentVolume with the model.

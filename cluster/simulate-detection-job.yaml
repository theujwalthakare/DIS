apiVersion: batch/v1
kind: Job
metadata:
  name: simulate-detection
  namespace: default
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        job: simulate-detection
    spec:
      serviceAccountName: simulate-sa
      restartPolicy: Never
      containers:
        - name: simulate
          image: python:3.11-slim
          imagePullPolicy: Always
          command:
            - sh
            - -c
            - |
              pip install -q scikit-learn pandas numpy && \
              python /app/scripts/simulate_detection.py \
                --label app=example-app \
                --namespace default
          volumeMounts:
            - name: app-volume
              mountPath: /app
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: app-volume
          hostPath:
            path: /mnt/dis-app
            type: Directory

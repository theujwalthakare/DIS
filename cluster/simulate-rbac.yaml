apiVersion: v1
kind: ServiceAccount
metadata:
  name: simulate-sa
  namespace: default

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: simulate-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: simulate-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: simulate-sa
  namespace: default
roleRef:
  kind: Role
  name: simulate-role
  apiGroup: rbac.authorization.k8s.io
